<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/Shramik-Logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="#1a3c6e" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shramik - Har Haath Ko Kaam. India's digital platform connecting blue-collar workers with contractors and employers. Empowering 500+ million skilled workers." />
    <meta name="keywords" content="shramik, blue-collar, jobs, skilled workers, india, nashik, electrician, plumber, carpenter, contractor" />
    <meta property="og:title" content="Shramik - Har Haath Ko Kaam" />
    <meta property="og:description" content="India's digital backbone for the blue-collar workforce. Connecting skilled workers with contractors." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/Shramik-Logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shramik - Har Haath Ko Kaam" />
    <meta name="twitter:description" content="India's digital platform connecting blue-collar workers with contractors and employers." />
    <title>Shramik - Har Haath Ko Kaam</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#dc2626;color:white;padding:16px;font-size:14px;z-index:99999;font-family:sans-serif';
        d.textContent = (err && err.stack) ? err.stack : msg;
        document.body.prepend(d);
      };
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('Shramik ServiceWorker registered');
          }, err => {
            console.log('Shramik ServiceWorker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
